<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>팀 자기소개</title>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', Arial,
          sans-serif;
        background:
          radial-gradient(circle at top left, #dbeafe, transparent 35%),
          radial-gradient(circle at bottom right, #fce7f3, transparent 35%),
          linear-gradient(135deg, #f8fafc, #eef2ff);
        color: #1f2937;
      }

      .profile-page {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 40px 20px;
      }

      .profile-card {
        width: 100%;
        max-width: 760px;
        padding: 56px 48px;
        border-radius: 34px;
        background: rgba(255, 255, 255, 0.88);
        box-shadow: 0 24px 70px rgba(31, 41, 55, 0.16);
        border: 1px solid rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(14px);
        text-align: center;
      }

      .tag {
        display: inline-block;
        margin: 0 0 18px;
        padding: 9px 16px;
        border-radius: 999px;
        background-color: #eef2ff;
        color: #4f46e5;
        font-size: 14px;
        font-weight: 700;
      }

      h1 {
        margin: 0 0 18px;
        font-size: 42px;
        line-height: 1.3;
        letter-spacing: -1.2px;
      }

      .intro {
        margin: 0 auto 40px;
        max-width: 520px;
        color: #4b5563;
        line-height: 1.8;
        font-size: 17px;
      }

      .button-group {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 14px;
      }

      .btn {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 54px;
        padding: 14px 18px;
        border-radius: 18px;
        background-color: #4f46e5;
        color: white;
        text-decoration: none;
        font-weight: 700;
        transition: 0.2s;
        box-shadow: 0 10px 20px rgba(79, 70, 229, 0.18);
      }

      .btn.outline {
        background-color: white;
        color: #4f46e5;
        border: 1px solid #c7d2fe;
        box-shadow: none;
      }

      .btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 14px 28px rgba(79, 70, 229, 0.22);
      }

      .btn.outline:hover {
        background-color: #eef2ff;
      }

      @media (max-width: 768px) {
        .profile-page {
          padding: 28px 16px;
        }

        .profile-card {
          padding: 40px 24px;
          border-radius: 28px;
        }

        h1 {
          font-size: 31px;
        }

        .intro {
          font-size: 16px;
          margin-bottom: 32px;
        }

        .button-group {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

  <body>
    <main class="profile-page">
      <section class="profile-card">
        <div class="profile-content">
          <p class="tag">Team Self Introduction</p>

          <h1>우리 팀을 소개합니다 👋</h1>

          <p class="intro">
            아래 버튼을 눌러 각 팀원의 자기소개 페이지를 확인해보세요.
          </p>

          <div class="button-group">
            <a href="./taehee.html" class="btn">김태희</a>
            <a href="./ahhyunii.html" class="btn outline">아현</a>
            <a href="./jsw-page.html" class="btn outline">순원</a>
            <a href="./ib.html" class="btn outline">인범</a>
            <a href="./dh.html" class="btn outline">동희</a>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
